publish_to: 'none'
version: 1.0.0+1

environment:
  # KORREKTUR: Wir erlauben jede Dart-Version ab 3.0.0. Deine Version 3.9.2 passt da perfekt rein.
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  sqflite:
  sqflite_common_ffi:
  path: 
  image_picker:
  flutter_markdown:
