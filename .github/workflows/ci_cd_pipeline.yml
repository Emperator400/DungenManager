name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        
    - name: Install dependencies
      run: |
        cd dungen_manager
        flutter pub get
        
    - name: Analyze code
      run: |
        cd dungen_manager
        flutter analyze
        
    - name: Run unit tests
      run: |
        cd dungen_manager
        flutter test --coverage
        
    - name: Run integration tests
      run: |
        cd dungen_manager
        flutter test integration_test/
        
    - name: Generate coverage report
      run: |
        cd dungen_manager
        flutter test --coverage
        genhtml coverage/lcov.info -o coverage/html
        
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage/lcov.info
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: true

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        
    - name: Install dependencies
      run: |
        cd dungen_manager
        flutter pub get
        
    - name: Build APK
      run: |
        cd dungen_manager
        flutter build apk --release
        
    - name: Build Web
      run: |
        cd dungen_manager
        flutter build web --release
        
    - name: Upload APK artifacts
      uses: actions/upload-artifact@v3
      with:
        name: android-apk
        path: dungen_manager/build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
        
    - name: Upload Web artifacts
      uses: actions/upload-artifact@v3
      with:
        name: web-build
        path: dungen_manager/build/web/
        retention-days: 30

  performance:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        
    - name: Install dependencies
      run: |
        cd dungen_manager
        flutter pub get
        
    - name: Run performance tests
      run: |
        cd dungen_manager
        flutter test integration_test/cross_feature_integration_test.dart --reporter=json > performance_report.json
        
    - name: Upload performance report
      uses: actions/upload-artifact@v3
      with:
        name: performance-report
        path: performance_report.json
        retention-days: 7

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Run security scan
      uses: securecodewarrior/github-action@v1
      with:
        language: dart
        
    - name: Run dependency check
      run: |
        cd dungen_manager
        flutter pub deps --style=tree

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/develop'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        
    - name: Install dependencies
      run: |
        cd dungen_manager
        flutter pub get
        
    - name: Deploy to staging
      run: |
        echo "Deploying to staging environment..."
        # Hier würde das Deployment-Skript stehen
        # z.B. Firebase Hosting, Vercel, etc.
        
    - name: Run smoke tests
      run: |
        cd dungen_manager
        flutter test integration_test/smoke_test.dart

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        
    - name: Create tag
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git tag -a v${{ github.run_number }} -m "Release v${{ github.run_number }}"
        git push origin v${{ github.run_number }}
        
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          dungen_manager/build/app/outputs/flutter-apk/app-release.apk
          dungen_manager/build/web/
        draft: false
        prerelease: false
        name: Release v${{ github.run_number }}
        tag_name: v${{ github.run_number }}
        generate_release_notes: true

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [test, performance, security]
    
    steps:
    - name: Quality Check
      run: |
        echo "Running quality checks..."
        
        # Check test results
        if [ $? -ne 0 ]; then
          echo "Tests failed"
          exit 1
        fi
        
        # Check performance metrics
        if [ $? -ne 0 ]; then
          echo "Performance tests failed"
          exit 1
        fi
        
        # Check security scan
        if [ $? -ne 0 ]; then
          echo "Security scan failed"
          exit 1
        fi
        
        echo "All quality checks passed!"

  notification:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [test, build, quality-gate]
    if: always()
    
    steps:
    - name: Send notification
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        channel: '#dungen-manager-ci'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        fields: repo,message,commit,author,action,eventName,ref,workflow
      if: github.event_name != 'pull_request'
